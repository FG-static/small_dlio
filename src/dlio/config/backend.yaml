small_dlio_loop_detector:
  ros__parameters:
    keyframe_topic: "/keyframe_msg"
    filtered_keyframe_topic: ""
    marker_topic: "/loop_candidates_marker"
    optimized_path_topic: "/optimized_path"
    optimized_keyframes_topic: "/optimized_keyframes"
    timing_topic: "/lcd_pgo_timing"
    marker_frame: "odom"
    body_frame: "body"
    lidar_frame: "livox_frame"
    t_body_lidar: [-0.011, -0.02329, 0.04412]
    q_body_lidar: [1.0, 0.0, 0.0, 0.0]
    T_body_lidar:
      [
        1.0,
        0.0,
        0.0,
        -0.011,
        0.0,
        1.0,
        0.0,
        -0.02329,
        0.0,
        0.0,
        1.0,
        0.04412,
        0.0,
        0.0,
        0.0,
        1.0,
      ]
    kf_trans_thresh: 0.5
    kf_rot_thresh: 0.1745
    min_kf_interval_sec: 0.0
    min_cloud_points: 10
    loop_enable: true
    loop_min_keyframe_gap: 0
    loop_min_travel_distance: 8.0
    loop_iris_distance_thresh: 0.25
    loop_gicp_enable: true
    loop_gicp_score_thresh: 1.0
    loop_gicp_max_correction_trans: 2.5
    loop_gicp_max_correction_rot_deg: 25.0
    loop_gicp_use_submap: true
    loop_gicp_submap_keyframes: 7
    loop_gicp_submap_leaf_size: 0.15
    loop_gicp_num_threads: 4
    loop_gicp_correspondence_randomness: 20
    loop_gicp_max_correspondence_distance: 1.5
    pgo_enable: true
    pgo_optimize_on_loop: true
    pgo_max_iterations: 20
    pgo_odom_edge_weight: 150.0
    pgo_loop_edge_weight: 850.0
    # Information matrix diagonal order: [x, y, z, roll, pitch, yaw].
    # Higher value means stronger trust in that DoF.
    pgo_odom_info_diag: [150.0, 150.0, 50.0, 40.0, 40.0, 200.0]
    pgo_loop_info_diag: [650.0, 650.0, 250.0, 150.0, 150.0, 850.0]
    iris_nscale: 4
    iris_min_wave_length: 18
    iris_mult: 1.6
    iris_sigma_onf: 0.75
    iris_match_num: 2

fastlio_keyframe_bridge:
  ros__parameters:
    odom_topic: "/Odometry"
    cloud_topic: "/cloud_registered_body"
    keyframe_topic: "/keyframe_candidates"
    map_frame: "camera_init"
    body_frame: "body"
    max_cloud_delay_sec: 0.05
    min_cloud_points: 10
