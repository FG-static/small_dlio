small_dlio_loop_detector:
  ros__parameters:
    keyframe_topic: "/keyframe_msg"
    filtered_keyframe_topic: ""
    marker_topic: "/loop_candidates_marker"
    optimized_path_topic: "/optimized_path"
    optimized_keyframes_topic: "/optimized_keyframes"
    timing_topic: "/lcd_pgo_timing"
    marker_frame: "odom"
    body_frame: "body"
    lidar_frame: "livox_frame"
    t_body_lidar: [-0.011, -0.02329, 0.04412]
    q_body_lidar: [1.0, 0.0, 0.0, 0.0]
    T_body_lidar:
      [
        1.0,
        0.0,
        0.0,
        -0.011,
        0.0,
        1.0,
        0.0,
        -0.02329,
        0.0,
        0.0,
        1.0,
        0.04412,
        0.0,
        0.0,
        0.0,
        1.0,
      ]
    keyframe_exclusion_box_enable: true
    keyframe_exclusion_min_x: -3.0
    keyframe_exclusion_max_x: -0.2
    keyframe_exclusion_min_y: -1.2
    keyframe_exclusion_max_y: 1.2
    keyframe_exclusion_min_z: -0.1
    keyframe_exclusion_max_z: 2.0
    kf_trans_thresh: 1.0
    kf_rot_thresh: 0.3
    min_kf_interval_sec: 0.0
    min_cloud_points: 10
    loop_enable: true
    loop_min_keyframe_gap: 0
    loop_min_travel_distance: 8.0
    loop_iris_distance_thresh: 0.45 # IRIS DIST GATE
    loop_gicp_enable: true
    loop_gicp_score_thresh: 0.5 # GICP SCORE GATE
    loop_gicp_max_correction_trans: 2.5
    loop_gicp_max_correction_rot_deg: 25.0
    loop_gicp_selection_correction_trans_weight: 0.1
    loop_gicp_selection_correction_rot_weight: 0.0
    loop_gicp_use_submap: true
    loop_gicp_submap_keyframes: 7
    loop_gicp_submap_leaf_size: 0.15
    loop_gicp_num_threads: 4
    loop_gicp_correspondence_randomness: 20
    loop_gicp_max_correspondence_distance: 1.5
    pgo_enable: true
    pgo_optimize_on_loop: true
    pgo_max_iterations: 20
    pgo_odom_edge_weight: 150.0
    pgo_loop_edge_weight: 850.0
    loop_edge_min_current_gap: 0 # 帧
    loop_edge_min_travel_gap: 0.0 # 里程计距离
    # Information matrix diagonal order: [x, y, z, roll, pitch, yaw].
    # Higher value means stronger trust in that DoF.
    pgo_odom_info_diag: [350.0, 350.0, 150.0, 140.0, 140.0, 400.0]
    pgo_loop_info_diag: [180.0, 180.0, 90.0, 60.0, 60.0, 200.0]
    pgo_loop_info_dynamic_enable: true
    pgo_loop_info_score_ref: 0.5
    pgo_loop_info_score_floor: 0.05
    pgo_loop_info_min_scale: 0.2
    pgo_loop_info_max_scale: 2.0
    pgo_loop_robust_kernel_enable: true
    pgo_loop_robust_kernel_delta: 1.0
    lcd_retrieval_enable: true
    lcd_retrieval_top_k: 120
    lcd_retrieval_max_distance: -1.0
    iris_nscale: 4
    iris_min_wave_length: 18
    iris_mult: 1.6
    iris_sigma_onf: 0.75
    iris_match_num: 2
    cart_enable: true
    cart_x_unit_m: 0.5
    cart_y_unit_m: 0.1
    cart_x_max_m: 50.0
    cart_y_max_m: 25.0
    cart_voxel_leaf_m: 0.0
    cart_height_offset_m: 0.0
    cart_use_align_key: true
    cart_align_search_ratio: 0.04
    cart_candidate_top_k: 10
    loop_descriptor_verify_top_k: 5
    cart_distance_thresh: 0.55 # CART DIST GATE

fastlio_keyframe_bridge:
  ros__parameters:
    odom_topic: "/Odometry"
    cloud_topic: "/cloud_registered_body"
    keyframe_topic: "/keyframe_candidates"
    map_frame: "camera_init"
    body_frame: "body"
    max_cloud_delay_sec: 0.05
    min_cloud_points: 10
