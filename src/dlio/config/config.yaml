small_dlio_odom:
  ros__parameters:
    # ========== Frame IDs ==========
    odom_frame: "odom"
    body_frame: "body"
    lidar_frame: "livox_frame"

    # ========== Topics ==========
    imu_topic: "/livox/imu"
    cloud_topic: "/livox/lidar"

    # ========== Extrinsics ==========
    # body -> IMU
    t_body_imu: [0.0, 0.0, 0.0]
    q_body_imu: [1.0, 0.0, 0.0, 0.0] # w, x, y, z

    # body -> LiDAR
    t_body_lidar: [0.0, 0.0, 0.0]
    q_body_lidar: [1.0, 0.0, 0.0, 0.0]

    # ========== Gravity ==========
    gravity: [0.0, 0.0, 9.8]

    # ========== IMU Calibration ==========
    imu_calibrate: true # 启动时标定 IMU 零偏
    imu_calib_time: 1.5 # 标定时长（秒）
    imu_acc_scale: 9.80665 # Livox IMU acceleration is reported in g; convert to m/s^2

    # ========== Keyframe Detection ==========
    kf_trans_thresh: 0.1 # meters
    kf_rot_thresh: 0.1 # radians (~5~7 deg)
    max_alignment_score: 1.0

    # ========== Submap (kd-tree) ==========
    knn_limit: 5
    max_distance: 20.0 # meters
    log_throttle_ms: 10

    # ========== GICP ==========
    gicp_leaf_size: 0.2 # voxel filter leaf size (m)
    gicp_num_threads: 4
    gicp_correspondence_randomness: 20
    gicp_max_correspondence_distance: 0.5
    gicp_reject_reset_threshold: 3
    gicp_max_correction_trans: 2.0 # meters, norm of T_corr translation
    gicp_max_correction_rot_deg: 8.0 # degrees, rotation of T_corr
    gicp_max_imu_to_gicp_trans: 2.0 # meters, imu prior to gicp pose
    gicp_max_imu_to_gicp_rot_deg: 8.0 # degrees, imu prior to gicp pose

    # ========== Geometric Observer Gains ==========
    geo_Kp: 4.5
    geo_Kv: 11.25
    geo_Kq: 4.0
    geo_Ka: 2.25
    geo_Kg: 1.0
    geo_b_max: 5.0
    geo_max_delta_v: 0.75 # m/s, max single-frame velocity correction
    geo_max_delta_ba: 0.1 # m/s^2, max single-frame accel bias correction
    geo_max_delta_bg: 0.05 # rad/s, max single-frame gyro bias correction
    geo_max_velocity: 20.0 # m/s, absolute velocity guard

    # ========== Map ==========
    map_leaf_size: 0.55
    map_topic: "/global_map"
    keyframe_topic: "/keyframe"

map_node:
  ros__parameters:
    map_leaf_size: 0.55
    map_topic: "/global_map"
    keyframe_topic: "/keyframe"
    save_map_service_name: "/save_map"
    map_save_path: "/home/goose/small_dlio/global_map.pcd"
